name: Release

on:
  push:
    tags:
      - "v*"

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

jobs:
  lint-gate:
    name: Lint Gate (ktlint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint (release gate)
        run: ./gradlew ktlintCheck

  build-android:
    name: Build Android (AAB/APK)
    needs: lint-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > androidApp/release.keystore

      - name: Build release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleRelease

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            androidApp/build/outputs/bundle/release/*.aab
            androidApp/build/outputs/apk/release/*.apk
          retention-days: 14

  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    needs: lint-gate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Windows (MSI)
            os: windows-latest
            task: ":desktopApp:packageMsi"
            artifact-path: "desktopApp/build/compose/binaries/main/msi/"
            artifact-name: desktop-windows-msi
          - target: Windows (MSIX)
            os: windows-latest
            task: ":desktopApp:packageMsix"
            artifact-path: "desktopApp/build/compose/binaries/main/msix/"
            artifact-name: desktop-windows-msix
          - target: macOS (DMG)
            os: macos-latest
            task: ":desktopApp:packageDmg"
            artifact-path: "desktopApp/build/compose/binaries/main/dmg/"
            artifact-name: desktop-macos-dmg
          - target: macOS (PKG)
            os: macos-latest
            task: ":desktopApp:packagePkg"
            artifact-path: "desktopApp/build/compose/binaries/main/pkg/"
            artifact-name: desktop-macos-pkg
          - target: Linux (Deb)
            os: ubuntu-latest
            task: ":desktopApp:packageDeb"
            artifact-path: "desktopApp/build/compose/binaries/main/deb/"
            artifact-name: desktop-linux-deb
          - target: Linux (Snap)
            os: ubuntu-latest
            task: ""
            artifact-path: "*.snap"
            artifact-name: desktop-linux-snap
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build desktop package (${{ matrix.target }})
        if: matrix.task != ''
        run: ./gradlew ${{ matrix.task }}

      - name: Install Snapcraft (Linux only)
        if: matrix.target == 'Linux (Snap)'
        uses: samber/setup-snapcraft@v2

      - name: Build Snap package (Linux only)
        if: matrix.target == 'Linux (Snap)'
        run: snapcraft

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 14

  build-ios:
    name: Build iOS (IPA)
    needs: lint-gate
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Apple certificate and provisioning profile
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$P12_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build shared framework for iOS
        run: ./gradlew :sharedLogic:linkReleaseFrameworkIosArm64

      - name: Build iOS IPA
        working-directory: iosApp
        run: |
          xcodebuild -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -sdk iphoneos \
            archive

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14

  publish-google-play:
    name: Publish to Google Play
    needs: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release

      - name: Publish AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.falconlabs.aitranslator
          releaseFiles: bundle/release/*.aab
          track: internal
          status: draft

  publish-app-store:
    name: Publish to App Store Connect
    needs: build-ios
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release

      - name: Upload IPA to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o $API_KEY_PATH

          xcrun altool --upload-app \
            --type ios \
            --file *.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

  publish-windows-store:
    name: Publish to Windows Store (MSIX)
    needs: build-desktop
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Download Windows MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-msix

      - name: Submit to Windows Store
        uses: nickkraakman/windowsstore-submit-action@v1
        with:
          app-id: ${{ secrets.WINDOWS_STORE_APP_ID }}
          tenant-id: ${{ secrets.WINDOWS_STORE_TENANT_ID }}
          client-id: ${{ secrets.WINDOWS_STORE_CLIENT_ID }}
          client-secret: ${{ secrets.WINDOWS_STORE_CLIENT_SECRET }}
          package-path: "**/*.msix"

  publish-snap-store:
    name: Publish to Snap Store
    needs: build-desktop
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download Snap artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux-snap

      - name: Install Snapcraft
        uses: samber/setup-snapcraft@v2

      - name: Publish to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: snapcraft upload --release=edge *.snap

  create-github-release:
    name: Create GitHub Release
    needs: [build-android, build-desktop, build-ios]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG..$TAG" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Lexi Translator ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changes }}

            ## Downloads

            | Platform | Format | Store |
            |----------|--------|-------|
            | Android | AAB, APK | Google Play |
            | Windows | MSI, MSIX | Windows Store |
            | Linux | Snap | Snap Store |
            | iOS | IPA | App Store |
          files: release-artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
